map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    # Redirect /devlab to /devlab/
    location = /devlab {
        return 302 /devlab/;
    }

    location /devlab/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        # Disable backend compression so sub_filter can rewrite content
        proxy_set_header Accept-Encoding "";

        # Rewrite Location headers in redirects (e.g. / -> /devlab/)
        proxy_redirect / /devlab/;

        # Rewrite absolute paths in HTML/JS/CSS responses
        # text/html is included by default in sub_filter_types
        sub_filter_once off;
        sub_filter_types application/javascript text/css;
        sub_filter '="/'  '="/devlab/';
        sub_filter "='/"  "='/devlab/";
        sub_filter 'url(/' 'url(/devlab/';

        # Long timeouts for WebSocket connections (terminal, LSP)
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check endpoint
    location = /devlab/healthz {
        proxy_pass http://127.0.0.1:8081/healthz;
    }
}
